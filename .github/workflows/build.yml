name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 🔥 YAHAN HAI ASLI JADUU 🔥
      # Ye step purane folder ko delete karke naya banayega aur Firebase key ko safe rakhega
      - name: Nuclear Fix for V2 Embedding
        run: |
          # 1. Agar Firebase JSON hai toh usko bacha lo
          if [ -f "android/app/google-services.json" ]; then
            cp android/app/google-services.json ./google-services-backup.json
          fi
          
          # 2. Purana corrupted Android folder hamesha ke liye delete kar do
          rm -rf android
          
          # 3. Ek naya, 100% updated Android folder banao (V2 Embedding ke sath)
          flutter create . --platforms=android --org com.bgmiuc
          
          # 4. Firebase JSON ko wapas uski jagah rakh do
          if [ -f "./google-services-backup.json" ]; then
            cp ./google-services-backup.json android/app/google-services.json
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
