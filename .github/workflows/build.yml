name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 🔥 YAHAN HAI ASLI JADUU WALA STEP 🔥
      - name: Auto-Generate Android Folder & Inject Permissions
        run: |
          # 1. Firebase JSON ko safe rakhein
          if [ -f "android/app/google-services.json" ]; then
            cp android/app/google-services.json ./google-services-backup.json
          fi
          
          # 2. Purana folder delete karein
          rm -rf android
          
          # 3. Naya fresh folder banayein
          flutter create . --project-name bgmi --platforms=android --org com.bgmiuc
          
          # 4. Firebase JSON wapas daalein
          if [ -f "./google-services-backup.json" ]; then
            cp ./google-services-backup.json android/app/google-services.json
          fi

          # 5. MAGIC: AndroidManifest.xml me automatically Internet & UPI Permissions add karein
          perl -pi -e 's|(<manifest[^>]*>)|$1\n    \n    <uses-permission android:name="android.permission.INTERNET"/>\n    \n    <queries>\n        <package android:name="com.google.android.apps.nbu.paisa.user" />\n        <package android:name="com.phonepe.app" />\n        <package android:name="com.paytm.app" />\n        <package android:name="in.org.npci.upiapp" />\n    </queries>|g' android/app/src/main/AndroidManifest.xml

          # 6. MAGIC: build.gradle me automatically minSdkVersion 21 set karein (Firebase aur UPI ke liye mandatory)
          perl -pi -e 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          perl -pi -e 's/minSdkVersion 16/minSdkVersion 21/g' android/app/build.gradle
          perl -pi -e 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
